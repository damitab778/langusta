server {
    listen 80;

    # Serve the built React app from this folder
    root /usr/share/nginx/html;
    index index.html;

    # All non-file requests fall back to index.html so React Router handles them.
    # Without this, refreshing /grammar would return a 404 from nginx.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Forward all /api/* requests to the Express backend.
    # "backend" resolves to the backend container via Docker's internal DNS.
    # This replaces the Vite dev proxy (vite.config.js) for production.
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;

        # Pass the original host header so the backend knows who called it
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    }
}
